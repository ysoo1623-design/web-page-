<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Prediction Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        /* Top Text */
        .promo-text {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Title */
        h1 {
            font-size: 24px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        /* Centered Image */
        .image-box {
            width: 100%;
            margin-bottom: 35px;
            background: #f9f9f9;
            border-radius: 15px;
            overflow: hidden;
            line-height: 0;
        }

        .image-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Contact Button */
        .contact-btn {
            display: block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .contact-btn:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        .footer-tag {
            margin-top: 25px;
            font-size: 12px;
            color: #bbb;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="promo-text">₹400 FOR SURESHORTS PREDICTION</p>

        <h1>PREMIUM SURESHORT<br>PREDICTION MODE</h1>

        <div class="image-box">
            <img src="https://i.ibb.co/yndpdGJ0/image.png" alt="Sureshort Prediction">
        </div>

        <a href="https://t.me/AGENTMONUZZ" target="_blank" class="contact-btn">
            CONTACT OWNER
        </a>

        <p class="footer-tag">Official Channel Access</p>
    </div>

</body>
</html>
